<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topup Locations Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; }
        #map { width: 100%; height: 100vh; }
        .search-box {
            position: absolute; top: 10px; left: 50px; z-index: 1000;
            background: white; border-radius: 8px; padding: 8px 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3); display: flex; gap: 8px; align-items: center;
        }
        .search-box input {
            border: 1px solid #ddd; border-radius: 6px; padding: 6px 10px;
            font-size: 14px; width: 200px; outline: none;
        }
        .search-box input:focus { border-color: #4285f4; }
        .count-badge {
            background: #4285f4; color: white; border-radius: 12px;
            padding: 4px 10px; font-size: 12px; font-weight: bold;
        }
        .custom-popup .leaflet-popup-content-wrapper {
            border-radius: 8px; font-size: 14px;
        }
        .bt-label {
            background: transparent; border: none; box-shadow: none;
            font-size: 11px; font-weight: bold; color: #1a73e8;
            white-space: nowrap;
        }
        .popup-content { text-align: center; }
        .popup-content h3 { color: #1a73e8; margin-bottom: 6px; font-size: 16px; }
        .popup-content p { color: #555; margin: 2px 0; font-size: 12px; }
        .popup-content a {
            display: inline-block; margin-top: 8px; padding: 4px 12px;
            background: #1a73e8; color: white; border-radius: 4px;
            text-decoration: none; font-size: 12px;
        }
        .popup-content a:hover { background: #1557b0; }
        .list-panel {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: white; border-radius: 8px; width: 260px; max-height: 90vh;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3); display: flex; flex-direction: column;
        }
        .list-header {
            padding: 10px 14px; border-bottom: 1px solid #eee;
            font-weight: bold; font-size: 14px; color: #333;
            display: flex; justify-content: space-between; align-items: center;
        }
        .list-toggle {
            background: #4285f4; color: white; border: none; border-radius: 4px;
            padding: 2px 8px; cursor: pointer; font-size: 12px;
        }
        .list-body {
            overflow-y: auto; flex: 1;
        }
        .list-item {
            padding: 8px 14px; border-bottom: 1px solid #f0f0f0;
            cursor: pointer; font-size: 13px; transition: background 0.15s;
        }
        .list-item:hover { background: #e8f0fe; }
        .list-item .bt-name { font-weight: bold; color: #1a73e8; }
        .list-item .bt-coords { color: #888; font-size: 11px; }

        @media (max-width: 600px) {
            .search-box { left: 10px; right: 10px; }
            .search-box input { width: 100%; flex: 1; }
            .list-panel { display: none; }
            .list-panel.show { display: flex; width: 100%; left: 0; right: 0; top: auto; bottom: 0; max-height: 40vh; border-radius: 12px 12px 0 0; }
        }
    </style>
</head>

    <div id="map"></div>

        const map = L.map('map').setView([13.88, 100.49], 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        const markers = L.markerClusterGroup();
        const markerMap = {};

        locations.forEach(loc => {
            const marker = L.marker([loc.lat, loc.lng]);
            marker.bindTooltip(loc.name, {
                permanent: true, direction: 'top', offset: [0, -10],
                className: 'bt-label'
            });
            marker.bindPopup(`
                <div class="popup-content">
                    <h3>${loc.name}</h3>
                    <p>Lat: ${loc.lat}, Lng: ${loc.lng}</p>
                    <a href="https://www.google.com/maps?q=${loc.lat},${loc.lng}" target="_blank">เปิดใน Google Maps</a>
                </div>
            `, {className: 'custom-popup'});
            markers.addLayer(marker);
            markerMap[loc.name] = marker;
        });

        map.addLayer(markers);

        // List panel
        const listBody = document.getElementById('listBody');
        const listToggle = document.getElementById('listToggle');
        const listPanel = document.getElementById('listPanel');

        function renderList(filtered) {
            listBody.innerHTML = '';
            filtered.forEach(loc => {
                const item = document.createElement('div');
                item.className = 'list-item';
                item.innerHTML = `<div class="bt-name">${loc.name}</div><div class="bt-coords">${loc.lat}, ${loc.lng}</div>`;
                item.onclick = () => {
                    const m = markerMap[loc.name];
                    markers.zoomToShowLayer(m, () => { m.openPopup(); });
                };
                listBody.appendChild(item);
            });
            document.getElementById('count').textContent = filtered.length + ' จุด';
        }

        renderList(locations);

        listToggle.onclick = () => {
            const body = listBody;
            if (body.style.display === 'none') {
                body.style.display = 'block';
                listToggle.textContent = 'ซ่อน';
            } else {
                body.style.display = 'none';
                listToggle.textContent = 'แสดง';
            }
        };

        // Search
        document.getElementById('search').addEventListener('input', (e) => {
            const q = e.target.value.toUpperCase();
            const filtered = locations.filter(l => l.name.toUpperCase().includes(q));
            renderList(filtered);
        });

</html>
