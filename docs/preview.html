<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BT Locations — Mobile Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #0a0b0f;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 20px 30px;
    color: #e2e8f0;
  }
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(91,143,255,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(45,255,160,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  /* ── Top Controls ── */
  .controls {
    position: relative; z-index: 10;
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 24px; flex-wrap: wrap; justify-content: center;
  }
  .logo { font-size: 15px; font-weight: 800; color: #5b8fff; letter-spacing: -0.02em; margin-right: 4px; }
  .badge {
    font-size: 10px; font-weight: 700; padding: 3px 8px;
    background: rgba(91,143,255,0.15); border: 0.5px solid rgba(91,143,255,0.3);
    border-radius: 20px; color: #5b8fff;
  }
  .sep { width: 1px; height: 20px; background: rgba(255,255,255,0.1); }
  .device-btn {
    padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
    border: 0.5px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05);
    color: #94a3b8; cursor: pointer; font-family: inherit; transition: all 0.15s;
    white-space: nowrap;
  }
  .device-btn:hover { background: rgba(255,255,255,0.1); color: #e2e8f0; }
  .device-btn.active { background: rgba(91,143,255,0.15); border-color: rgba(91,143,255,0.4); color: #5b8fff; }
  .open-btn {
    padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
    border: none; background: #5b8fff; color: white; cursor: pointer; font-family: inherit;
    transition: all 0.15s; text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
  }
  .open-btn:hover { background: #7aaaff; }

  /* ── Phone Frame ── */
  .scene { position: relative; z-index: 10; }
  .phone-wrap {
    position: relative;
    transition: all 0.3s cubic-bezier(0.34,1.1,0.64,1);
  }
  .phone-frame {
    position: relative;
    background: #111318;
    border-radius: 52px;
    box-shadow:
      inset 0 0 0 1.5px rgba(255,255,255,0.18),
      inset 0 0 0 3px #1a1d24,
      0 0 0 1px rgba(255,255,255,0.06),
      0 40px 80px rgba(0,0,0,0.8),
      0 12px 30px rgba(0,0,0,0.5);
    padding: 14px;
  }
  /* side buttons */
  .phone-frame::before {
    content: '';
    position: absolute; right: -3px; top: 100px;
    width: 3px; height: 60px;
    background: #1e2128;
    border-radius: 0 3px 3px 0;
    box-shadow: 0 90px 0 #1e2128;
  }
  .phone-frame::after {
    content: '';
    position: absolute; left: -3px; top: 80px;
    width: 3px; height: 36px;
    background: #1e2128;
    border-radius: 3px 0 0 3px;
    box-shadow: 0 50px 0 #1e2128, 0 96px 0 #1e2128;
  }

  .phone-screen {
    border-radius: 40px;
    overflow: hidden;
    background: #000;
    position: relative;
  }
  /* Dynamic island / notch */
  .phone-notch {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    z-index: 10; pointer-events: none;
  }
  .notch-pill {
    width: 120px; height: 34px;
    background: #000; border-radius: 20px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    position: relative;
    display: flex; align-items: center; justify-content: flex-end;
    padding-right: 10px;
  }
  .notch-cam {
    width: 12px; height: 12px; border-radius: 50%;
    background: #1a1a1a;
    box-shadow: inset 0 0 0 2px #111, 0 0 0 1px rgba(255,255,255,0.05);
  }
  /* home bar */
  .home-bar {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 130px; height: 5px;
    background: rgba(255,255,255,0.3); border-radius: 3px;
    z-index: 10; pointer-events: none;
  }

  iframe {
    border: none; display: block;
    /* scale content to match actual phone pixel density feel */
  }

  /* ── Device info strip ── */
  .device-info {
    margin-top: 16px; text-align: center;
    font-size: 12px; color: rgba(255,255,255,0.3);
    letter-spacing: 0.05em;
  }
  .device-info strong { color: rgba(255,255,255,0.55); }

  /* ── Orientation toggle ── */
  .orient-btn {
    padding: 6px 12px; border-radius: 20px; font-size: 12px;
    border: 0.5px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05);
    color: #94a3b8; cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .orient-btn:hover { background: rgba(255,255,255,0.1); color: #e2e8f0; }

  .hint {
    margin-top: 20px; font-size: 11px; color: rgba(255,255,255,0.2);
    text-align: center; line-height: 1.8; position: relative; z-index: 10;
  }
  .hint a { color: #5b8fff; text-decoration: none; }
  .hint a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="controls">
  <span class="logo">📱 BT Locations</span>
  <span class="badge">Mobile Preview</span>
  <div class="sep"></div>
  <!-- Device presets -->
  <button class="device-btn" onclick="setDevice('se')" id="btn-se">iPhone SE<br><small>375×667</small></button>
  <button class="device-btn active" onclick="setDevice('14')" id="btn-14">iPhone 14<br><small>390×844</small></button>
  <button class="device-btn" onclick="setDevice('plus')" id="btn-plus">iPhone 14 Plus<br><small>430×932</small></button>
  <button class="device-btn" onclick="setDevice('pixel')" id="btn-pixel">Pixel 7<br><small>412×892</small></button>
  <button class="device-btn" onclick="setDevice('s24')" id="btn-s24">Galaxy S24<br><small>360×780</small></button>
  <div class="sep"></div>
  <button class="orient-btn" onclick="toggleOrient()" id="orientBtn">⟳ Landscape</button>
  <div class="sep"></div>
  <a class="open-btn" href="index.html" target="_blank">↗ เปิดเต็มจอ</a>
</div>

<div class="scene">
  <div class="phone-wrap" id="phoneWrap">
    <div class="phone-frame" id="phoneFrame">
      <div class="phone-screen" id="phoneScreen">
        <div class="phone-notch">
          <div class="notch-pill">
            <div class="notch-cam"></div>
          </div>
        </div>
        <iframe id="appFrame" src="index.html" scrolling="no" title="BT Locations App"></iframe>
        <div class="home-bar"></div>
      </div>
    </div>
  </div>
</div>

<div class="device-info" id="deviceInfo">
  <strong>iPhone 14</strong> — 390 × 844 px logical · 1179 × 2556 px physical (3×)
</div>

<div class="hint">
  กด <strong>F12 → DevTools → Console</strong> ในหน้านี้เพื่อ debug<br>
  หรือ <a href="index.html" target="_blank">เปิดแบบเต็มจอ</a> แล้วใช้ Chrome DevTools Device Toolbar (Ctrl+Shift+M)
</div>

<script>
const DEVICES = {
  se:    { name: 'iPhone SE',       w: 375, h: 667,  r: '44px', dpr: '2×', pW: 750,  pH: 1334  },
  '14':  { name: 'iPhone 14',       w: 390, h: 844,  r: '52px', dpr: '3×', pW: 1179, pH: 2556  },
  plus:  { name: 'iPhone 14 Plus',  w: 430, h: 932,  r: '55px', dpr: '3×', pW: 1284, pH: 2778  },
  pixel: { name: 'Pixel 7',         w: 412, h: 892,  r: '40px', dpr: '2.6×', pW: 1080, pH: 2340 },
  s24:   { name: 'Galaxy S24',      w: 360, h: 780,  r: '40px', dpr: '3×', pW: 1080, pH: 2340  },
};

let currentDevice = '14';
let isLandscape = false;

function setDevice(key) {
  currentDevice = key;
  const d = DEVICES[key];
  isLandscape = false;
  applyDevice(d);
  document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + key)?.classList.add('active');
  document.getElementById('orientBtn').textContent = '⟳ Landscape';
  document.getElementById('deviceInfo').innerHTML =
    `<strong>${d.name}</strong> — ${d.w} × ${d.h} px logical · ${d.pW} × ${d.pH} px physical (${d.dpr})`;
}

function applyDevice(d) {
  const w = isLandscape ? d.h : d.w;
  const h = isLandscape ? d.w : d.h;
  const frame = document.getElementById('phoneFrame');
  const screen = document.getElementById('phoneScreen');
  const iframe = document.getElementById('appFrame');

  frame.style.borderRadius = isLandscape ? '40px' : d.r;
  screen.style.borderRadius = isLandscape ? '28px' : (parseInt(d.r) - 12) + 'px';
  screen.style.width  = w + 'px';
  screen.style.height = h + 'px';
  iframe.style.width  = w + 'px';
  iframe.style.height = h + 'px';

  // Force mobile mode + invalidate map size after resize
  try {
    iframe.contentWindow.localStorage.setItem('bt_force_mobile_mode', 'true');
    const bd = iframe.contentDocument?.body;
    if (bd && !bd.classList.contains('force-mobile')) {
      bd.classList.add('force-mobile');
    }
  } catch(e) {}

  // Invalidate Leaflet map after layout settles
  setTimeout(function() {
    try {
      const imap = iframe.contentWindow?.map;
      if (imap && typeof imap.invalidateSize === 'function') {
        imap.invalidateSize({ animate: false });
      }
    } catch(e) {}
  }, 120);
}

function toggleOrient() {
  isLandscape = !isLandscape;
  const d = DEVICES[currentDevice];
  applyDevice(d);
  document.getElementById('orientBtn').textContent = isLandscape ? '⟳ Portrait' : '⟳ Landscape';
  const w = isLandscape ? d.h : d.w;
  const h = isLandscape ? d.w : d.h;
  document.getElementById('deviceInfo').innerHTML =
    `<strong>${d.name}</strong> ${isLandscape?'Landscape':''} — ${w} × ${h} px`;
}

// Set force-mobile in localStorage before iframe loads
try {
  localStorage.setItem('bt_force_mobile_mode', 'true');
} catch(e) {}

// Init
setDevice('14');
</script>

</body>
</html>
