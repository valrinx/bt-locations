<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT Locations</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&family=Noto+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #1a73e8;
            --blue-light: #e8f0fe;
            --green: #188038;
            --red: #d93025;
            --yellow: #f9ab00;
            --surface: #fff;
            --surface2: #f8f9fa;
            --border: #dadce0;
            --text: #202124;
            --text2: #5f6368;
            --text3: #80868b;
            --shadow-sm: 0 1px 3px rgba(60,64,67,.15), 0 1px 2px rgba(60,64,67,.3);
            --shadow-md: 0 1px 6px rgba(60,64,67,.28), 0 2px 10px 1px rgba(60,64,67,.15);
            --shadow-lg: 0 2px 10px rgba(60,64,67,.2), 0 6px 20px 4px rgba(60,64,67,.12);
            --radius: 24px;
            --sidebar-w: 400px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Noto Sans Thai', 'Google Sans', sans-serif;
            background: #e8eaed;
            overflow: hidden;
            height: 100vh;
        }

        /* ══════════════════ MAP ══════════════════ */
        #map {
            position: fixed; inset: 0;
            z-index: 0;
            cursor: default;
        }
        #map.add-cursor { cursor: crosshair; }

        /* ══════════════════ SEARCH BAR ══════════════════ */
        .search-bar {
            position: fixed;
            top: 12px; left: 12px;
            width: min(calc(100vw - 24px), var(--sidebar-w));
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .search-box {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            padding: 0 16px 0 12px;
            height: 56px;
            gap: 8px;
            transition: box-shadow 0.2s, border-radius 0.2s;
        }
        .search-box.focused {
            border-radius: var(--radius) var(--radius) 0 0;
            box-shadow: var(--shadow-lg);
        }
        .search-box.focused + .search-results { display: block; }

        .search-menu-btn {
            width: 40px; height: 40px;
            border-radius: 50%; border: none; background: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            color: var(--text2); flex-shrink: 0; transition: background 0.15s;
        }
        .search-menu-btn:hover { background: var(--surface2); }
        .search-menu-btn svg { width: 20px; height: 20px; }

        .search-input {
            flex: 1; border: none; outline: none;
            font-size: 16px; font-family: inherit;
            color: var(--text); background: transparent;
            caret-color: var(--blue);
        }
        .search-input::placeholder { color: var(--text3); }

        .search-clear {
            width: 36px; height: 36px; border-radius: 50%;
            border: none; background: none; cursor: pointer;
            display: none; align-items: center; justify-content: center;
            color: var(--text2); flex-shrink: 0;
        }
        .search-clear.show { display: flex; }
        .search-clear:hover { background: var(--surface2); }

        .search-divider {
            width: 1px; height: 24px; background: var(--border);
            flex-shrink: 0;
        }

        .search-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: var(--blue); color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 600; flex-shrink: 0;
            cursor: pointer;
        }

        /* Search Suggestions Dropdown */
        .search-results {
            display: none;
            background: var(--surface);
            border-radius: 0 0 var(--radius) var(--radius);
            box-shadow: 0 4px 10px rgba(60,64,67,.2);
            overflow: hidden;
            max-height: 400px; overflow-y: auto;
            border-top: 1px solid var(--border);
        }

        .search-result-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 16px; cursor: pointer;
            transition: background 0.1s;
        }
        .search-result-item:hover { background: var(--surface2); }
        .search-result-icon {
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--blue-light); color: var(--blue);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 16px;
        }
        .search-result-text { flex: 1; min-width: 0; }
        .search-result-name {
            font-size: 14px; font-weight: 500; color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .search-result-sub {
            font-size: 12px; color: var(--text3);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .search-result-dist {
            font-size: 12px; color: var(--text3); flex-shrink: 0;
        }

        /* ══════════════════ FILTER CHIPS ══════════════════ */
        .filter-chips {
            display: flex; gap: 8px; align-items: center;
            padding: 8px 4px 4px;
            overflow-x: auto; scrollbar-width: none;
        }
        .filter-chips::-webkit-scrollbar { display: none; }

        .chip {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 14px; border-radius: 20px;
            background: var(--surface); border: none;
            font-size: 13px; font-family: inherit; font-weight: 500;
            color: var(--text); cursor: pointer; flex-shrink: 0;
            box-shadow: var(--shadow-sm);
            transition: all 0.15s;
            white-space: nowrap;
        }
        .chip:hover { box-shadow: var(--shadow-md); background: var(--surface2); }
        .chip.active { background: var(--blue-light); color: var(--blue); }
        .chip svg { width: 16px; height: 16px; }

        /* ══════════════════ RIGHT SIDEBAR CONTROLS ══════════════════ */
        .map-controls {
            position: fixed; right: 12px; bottom: 120px;
            z-index: 1000; display: flex; flex-direction: column; gap: 8px;
        }

        .map-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--surface); border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: var(--shadow-md); color: var(--text2);
            transition: all 0.15s; flex-shrink: 0;
        }
        .map-btn:hover { background: var(--surface2); box-shadow: var(--shadow-lg); }
        .map-btn.active { color: var(--blue); }
        .map-btn svg { width: 20px; height: 20px; }

        .map-btn-group {
            background: var(--surface);
            border-radius: 8px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
            display: flex; flex-direction: column;
        }
        .map-btn-group .map-btn {
            width: 40px; height: 40px; border-radius: 0;
            box-shadow: none;
        }
        .map-btn-group .map-btn:not(:last-child) {
            border-bottom: 1px solid var(--border);
        }

        /* GPS Button */
        .gps-btn {
            position: fixed; right: 12px; bottom: 180px;
            z-index: 1000;
        }
        .gps-btn.locating { animation: spin 1s linear infinite; }
        @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }

        /* ══════════════════ FAB (Add Pin) ══════════════════ */
        .fab {
            position: fixed; right: 16px; bottom: 24px;
            z-index: 1001;
            background: var(--surface);
            border: none; border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            padding: 14px 20px;
            display: flex; align-items: center; gap: 10px;
            font-size: 14px; font-weight: 600; font-family: inherit;
            color: var(--text); cursor: pointer;
            transition: all 0.2s;
        }
        .fab:hover { box-shadow: 0 4px 16px rgba(60,64,67,.25); }
        .fab svg { color: var(--blue); width: 20px; height: 20px; }
        .fab.add-mode {
            background: var(--blue); color: white;
        }
        .fab.add-mode svg { color: white; }

        /* ══════════════════ COUNT BADGE ══════════════════ */
        .count-pill {
            position: fixed;
            bottom: 90px; left: 50%; transform: translateX(-50%);
            z-index: 1001;
            background: var(--text);
            color: white; border-radius: 20px;
            padding: 8px 18px; font-size: 13px; font-weight: 500;
            box-shadow: var(--shadow-md);
            pointer-events: none;
            opacity: 0; transition: opacity 0.3s;
        }
        .count-pill.show { opacity: 1; }

        /* ══════════════════ INFO PANEL (Sidebar) ══════════════════ */
        .info-panel {
            position: fixed;
            top: 0; left: 0; bottom: 0;
            width: var(--sidebar-w);
            background: var(--surface);
            z-index: 1100;
            box-shadow: var(--shadow-lg);
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .info-panel.open { transform: translateX(0); }

        .info-panel-backdrop {
            display: none; position: fixed; inset: 0;
            background: rgba(32,33,36,0.4); z-index: 1099;
        }
        .info-panel-backdrop.show { display: block; }

        .info-panel-header {
            padding: 16px 16px 8px;
            display: flex; align-items: center; gap: 8px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .info-panel-close {
            width: 36px; height: 36px; border-radius: 50%;
            border: none; background: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--text2); flex-shrink: 0;
        }
        .info-panel-close:hover { background: var(--surface2); }
        .info-panel-title { font-size: 18px; font-weight: 600; flex: 1; }

        .info-panel-body { flex: 1; overflow-y: auto; }

        /* Stats inside panel */
        .stats-section { padding: 16px; }
        .stats-header { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
        .stats-row {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 0; border-bottom: 1px solid var(--border);
        }
        .stats-row:last-child { border-bottom: none; }
        .stats-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .stats-name { flex: 1; font-size: 14px; color: var(--text); }
        .stats-count { font-size: 14px; font-weight: 600; color: var(--text2); }
        .stats-bar-wrap { width: 60px; height: 4px; background: var(--border); border-radius: 2px; }
        .stats-bar { height: 100%; border-radius: 2px; background: var(--blue); }

        /* ══════════════════ PLACE CARD (Bottom Sheet on Mobile) ══════════════════ */
        .place-card {
            position: fixed;
            bottom: -100%; left: 0; right: 0;
            background: var(--surface);
            border-radius: 16px 16px 0 0;
            box-shadow: 0 -2px 20px rgba(60,64,67,.2);
            z-index: 1050;
            transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 60vh; overflow-y: auto;
        }
        .place-card.open { bottom: 0; }

        /* Desktop: place card is a popup-like sidebar below search */
        @media (min-width: 600px) {
            .place-card {
                position: fixed;
                top: 80px; bottom: auto;
                left: 12px;
                width: var(--sidebar-w);
                border-radius: var(--radius);
                max-height: calc(100vh - 100px);
                box-shadow: var(--shadow-lg);
            }
            .place-card.open { bottom: auto; top: 80px; }
        }

        .place-card-drag { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 4px; }
        @media (min-width: 600px) { .place-card-drag { display: none; } }

        .place-card-close {
            position: absolute; top: 10px; right: 12px;
            width: 32px; height: 32px; border-radius: 50%;
            border: none; background: var(--surface2); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--text2); font-size: 18px;
        }
        .place-card-close:hover { background: var(--border); }

        .place-card-content { padding: 8px 16px 20px; }

        .place-card-name {
            font-size: 22px; font-weight: 600; color: var(--text);
            margin-bottom: 4px; padding-right: 40px;
        }
        .place-card-meta {
            font-size: 14px; color: var(--text2); margin-bottom: 14px;
            display: flex; align-items: center; gap: 6px;
        }
        .place-card-meta .dot { color: var(--text3); }

        .place-card-actions {
            display: flex; gap: 8px; margin-bottom: 16px;
        }
        .place-action-btn {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; gap: 4px; padding: 10px 4px;
            background: var(--blue-light); border: none; border-radius: 12px;
            cursor: pointer; transition: background 0.15s; text-decoration: none;
        }
        .place-action-btn:hover { background: #d2e3fc; }
        .place-action-btn.red { background: #fce8e6; }
        .place-action-btn.red:hover { background: #f5c6c3; }
        .place-action-btn.green { background: #e6f4ea; }
        .place-action-btn.green:hover { background: #ceead6; }
        .place-action-btn.yellow { background: #fef7e0; }
        .place-action-btn.yellow:hover { background: #fdeea3; }
        .place-action-icon { font-size: 20px; }
        .place-action-label { font-size: 11px; font-weight: 600; color: var(--blue); font-family: inherit; }
        .place-action-btn.red .place-action-label { color: var(--red); }
        .place-action-btn.green .place-action-label { color: var(--green); }
        .place-action-btn.yellow .place-action-label { color: #b45309; }

        .place-card-divider { height: 1px; background: var(--border); margin: 12px 0; }

        .place-card-row {
            display: flex; align-items: flex-start; gap: 14px;
            padding: 8px 0;
        }
        .place-card-row-icon { color: var(--text3); width: 20px; flex-shrink: 0; margin-top: 1px; }
        .place-card-row-text { flex: 1; font-size: 14px; color: var(--text); line-height: 1.5; }
        .place-card-row-text small { color: var(--text3); font-size: 12px; }

        /* ══════════════════ LIST VIEW ══════════════════ */
        .list-panel {
            position: fixed;
            bottom: -100%; left: 0; right: 0;
            background: var(--surface);
            border-radius: 16px 16px 0 0;
            box-shadow: 0 -2px 20px rgba(60,64,67,.2);
            z-index: 1049;
            transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 60vh;
            display: flex; flex-direction: column;
        }
        .list-panel.open { bottom: 0; }

        @media (min-width: 600px) {
            .list-panel {
                position: fixed;
                top: 80px; bottom: auto; left: 12px;
                width: var(--sidebar-w);
                border-radius: var(--radius);
                max-height: calc(100vh - 100px);
                box-shadow: var(--shadow-lg);
            }
        }

        .list-panel-header {
            padding: 16px 16px 8px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border); flex-shrink: 0;
        }
        .list-panel-title { font-size: 16px; font-weight: 600; }
        .list-panel-close { border: none; background: none; font-size: 20px; cursor: pointer; color: var(--text2); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .list-panel-close:hover { background: var(--surface2); }
        .list-body { overflow-y: auto; flex: 1; }

        .list-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border);
            transition: background 0.1s;
        }
        .list-item:hover { background: var(--surface2); }
        .list-item:last-child { border-bottom: none; }
        .list-item-icon {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 18px;
        }
        .list-item-text { flex: 1; min-width: 0; }
        .list-item-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-item-sub { font-size: 12px; color: var(--text3); }
        .list-item-chevron { color: var(--text3); font-size: 18px; }

        /* ══════════════════ MODAL (Add/Edit) ══════════════════ */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(32,33,36,0.5); z-index: 2000;
            align-items: center; justify-content: center;
            padding: 16px;
        }
        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--surface);
            border-radius: 28px;
            width: 100%; max-width: 420px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            animation: modalIn 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes modalIn { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }

        .modal-header {
            padding: 24px 24px 0;
            font-size: 22px; font-weight: 600; color: var(--text);
        }
        .modal-body { padding: 20px 24px; }
        .modal-field { margin-bottom: 16px; }
        .modal-field label {
            display: block; font-size: 12px; font-weight: 600;
            color: var(--blue); margin-bottom: 4px; letter-spacing: 0.5px;
        }
        .modal-field input {
            width: 100%; padding: 12px 14px;
            border: 2px solid var(--border); border-radius: 12px;
            font-size: 15px; font-family: inherit; color: var(--text);
            outline: none; transition: border-color 0.15s;
            background: var(--surface);
        }
        .modal-field input:focus { border-color: var(--blue); }

        .latlng-row { display: flex; gap: 10px; }
        .latlng-row .modal-field { flex: 1; }

        .gps-modal-btn {
            width: 100%; padding: 10px;
            border: 2px dashed var(--border); border-radius: 12px;
            background: var(--surface2); color: var(--blue);
            font-size: 13px; font-weight: 600; font-family: inherit;
            cursor: pointer; transition: all 0.15s; margin-bottom: 16px;
        }
        .gps-modal-btn:hover { border-color: var(--blue); background: var(--blue-light); }

        .modal-footer {
            padding: 8px 16px 16px;
            display: flex; gap: 8px; justify-content: flex-end;
        }
        .modal-btn {
            padding: 10px 24px; border-radius: 20px; border: none;
            font-size: 14px; font-weight: 600; font-family: inherit;
            cursor: pointer; transition: all 0.15s;
        }
        .modal-btn-cancel { background: none; color: var(--blue); }
        .modal-btn-cancel:hover { background: var(--blue-light); }
        .modal-btn-save { background: var(--blue); color: white; }
        .modal-btn-save:hover { background: #1557b0; box-shadow: 0 2px 8px rgba(26,115,232,.4); }

        /* ══════════════════ TOKEN MODAL ══════════════════ */
        .token-modal { max-width: 380px; }
        .token-icon { text-align: center; font-size: 48px; margin: 24px 0 8px; }
        .token-title { text-align: center; font-size: 20px; font-weight: 600; padding: 0 24px; }
        .token-sub { text-align: center; font-size: 14px; color: var(--text2); padding: 8px 24px 4px; line-height: 1.6; }

        /* ══════════════════ CONFIRM DIALOG ══════════════════ */
        .confirm-modal { max-width: 320px; }
        .confirm-icon { text-align: center; font-size: 36px; padding: 24px 24px 8px; }
        .confirm-title { font-size: 20px; font-weight: 600; padding: 0 24px; }
        .confirm-text { font-size: 14px; color: var(--text2); padding: 8px 24px 16px; line-height: 1.6; }
        .confirm-footer { padding: 8px 16px 16px; display: flex; gap: 8px; justify-content: flex-end; }
        .btn-danger { background: var(--red) !important; }
        .btn-danger:hover { background: #b31412 !important; }

        /* ══════════════════ ADD MODE BANNER ══════════════════ */
        .add-banner {
            position: fixed;
            top: 80px; left: 50%; transform: translateX(-50%);
            z-index: 1500;
            background: #202124; color: white;
            padding: 12px 20px; border-radius: 20px;
            font-size: 14px; font-weight: 500;
            box-shadow: var(--shadow-lg);
            display: none; align-items: center; gap: 10px;
            white-space: nowrap;
        }
        .add-banner.show { display: flex; }
        .add-banner-cancel {
            background: rgba(255,255,255,0.15); border: none; color: white;
            padding: 5px 14px; border-radius: 14px; font-size: 13px;
            cursor: pointer; font-family: inherit;
        }
        .add-banner-cancel:hover { background: rgba(255,255,255,0.25); }

        /* ══════════════════ CROSSHAIR ══════════════════ */
        #crosshair {
            display: none; position: fixed;
            pointer-events: none; z-index: 1600;
            transform: translate(-50%, -100%);
            font-size: 28px; filter: drop-shadow(0 2px 4px rgba(0,0,0,.4));
        }
        #crosshair.show { display: block; }

        /* ══════════════════ LATLNG HINT ══════════════════ */
        .latlng-hint {
            position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
            z-index: 1200; background: rgba(32,33,36,0.8); color: white;
            padding: 5px 14px; border-radius: 16px; font-size: 12px;
            pointer-events: none; opacity: 0; transition: opacity 0.2s;
        }
        .latlng-hint.show { opacity: 1; }

        /* ══════════════════ SAVE STATUS ══════════════════ */
        .save-toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            z-index: 2100; background: #202124; color: white;
            padding: 12px 20px; border-radius: 8px;
            font-size: 14px; box-shadow: var(--shadow-lg);
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
            white-space: nowrap;
        }
        .save-toast.show { opacity: 1; }
        .save-toast.error { background: var(--red); }

        /* ══════════════════ OVERFLOW MENU ══════════════════ */
        .overflow-menu {
            position: fixed; right: 56px; bottom: 24px;
            background: var(--surface); border-radius: 16px;
            box-shadow: var(--shadow-lg); overflow: hidden;
            z-index: 1060; min-width: 220px;
            transform-origin: bottom right;
            transform: scale(0); opacity: 0;
            transition: transform 0.2s cubic-bezier(0.4,0,0.2,1), opacity 0.15s;
            pointer-events: none;
        }
        .overflow-menu.show { transform: scale(1); opacity: 1; pointer-events: all; }
        .om-item {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 20px; border: none; background: none;
            width: 100%; text-align: left; font-size: 14px;
            font-family: inherit; color: var(--text); cursor: pointer;
            transition: background 0.1s;
        }
        .om-item:hover { background: var(--surface2); }
        .om-item svg { width: 20px; height: 20px; color: var(--text3); flex-shrink: 0; }
        .om-item.red { color: var(--red); }
        .om-item.red svg { color: var(--red); }
        .om-sep { height: 1px; background: var(--border); margin: 4px 0; }

        /* ══════════════════ DARK MODE ══════════════════ */
        body.dark {
            --surface: #202124; --surface2: #303134; --border: #5f6368;
            --text: #e8eaed; --text2: #9aa0a6; --text3: #5f6368;
            --blue-light: #1a3a6b; background: #202124;
        }

        /* ══════════════════ MOBILE ══════════════════ */
        @media (max-width: 599px) {
            :root { --sidebar-w: 100vw; }
            .search-bar { top: 8px; left: 8px; right: 8px; width: auto; }
            .map-controls { right: 8px; bottom: 110px; }
            .fab { right: 12px; bottom: 16px; }
            .count-pill { bottom: 80px; }
            .gps-btn { right: 8px; bottom: 170px; }
        }

        /* Leaflet overrides */
        .leaflet-control-zoom { display: none; }
        .leaflet-popup-content-wrapper {
            border-radius: 12px !important;
            box-shadow: var(--shadow-lg) !important;
            padding: 0 !important;
            overflow: hidden;
        }
        .leaflet-popup-content { margin: 0 !important; }
        .leaflet-popup-tip-container { display: none; }
        .leaflet-control-attribution { font-size: 10px; }

        /* Cluster colors */
        .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
            background: rgba(26,115,232,.25) !important;
        }
        .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
            background: rgba(26,115,232,.85) !important; color: white !important;
            font-weight: 700 !important; font-family: inherit !important;
        }

        /* You-are-here */
        .you-are-here {
            width: 18px; height: 18px; border-radius: 50%;
            background: #1a73e8; border: 3px solid white;
            box-shadow: 0 0 0 0 rgba(26,115,232,.6);
            animation: gps-pulse 2s infinite;
        }
        @keyframes gps-pulse {
            0%   { box-shadow: 0 0 0 0 rgba(26,115,232,.6); }
            70%  { box-shadow: 0 0 0 14px rgba(26,115,232,0); }
            100% { box-shadow: 0 0 0 0 rgba(26,115,232,0); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="locations.js"></script>
    <script>
    // ═══════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════
    const STORAGE_KEY = 'bt_locations_data';
    const GITHUB_TOKEN_KEY = 'bt_github_token';
    const REPO_OWNER = 'valrinx', REPO_NAME = 'bt-locations';
    const undoStack = [];
    const MAX_UNDO = 20;

    let locations = (() => {
        try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_LOCATIONS)); } catch(e) { return JSON.parse(JSON.stringify(DEFAULT_LOCATIONS)); }
    })();
    let addMode = false, editingIndex = -1;
    let filterList = '', filterCity = '';
    let heatmapMode = false;
    let measureStart = null, measureLine = null;
    let myLocationMarker = null, myLocationCircle = null;
    let searchPinMarker = null;

    function saveLocations() { localStorage.setItem(STORAGE_KEY, JSON.stringify(locations)); }
    function pushUndo() { undoStack.push(JSON.stringify(locations)); if (undoStack.length > MAX_UNDO) undoStack.shift(); }

    // ═══════════════════════════════════════════
    // MAP
    // ═══════════════════════════════════════════
    const map = L.map('map', { zoomControl: false }).setView([13.75, 100.5], 11);
    const tileLayers = {
        'Street': L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM', maxZoom: 19 }),
        'Satellite': L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '© Esri', maxZoom: 19 }),
        'Terrain': L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { attribution: '© OpenTopoMap', maxZoom: 17 }),
        'Dark': L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '© CartoDB', maxZoom: 19 })
    };
    const tileNames = Object.keys(tileLayers);
    let currentTileIdx = 0;
    tileLayers[tileNames[0]].addTo(map);

    let markerCluster = L.markerClusterGroup({ maxClusterRadius: 50 });
    let currentMarkers = [];
    let heatLayer = null;

    // Color
    const colorPalette = ['#ea4335','#fbbc04','#34a853','#4285f4','#9334e6','#00897b','#e91e63','#ff6d00','#0097a7','#795548'];
    const listColors = {};
    function getColor(list) {
        if (!listColors[list]) {
            let h = 0; for (let i=0;i<list.length;i++) h = list.charCodeAt(i)+((h<<5)-h);
            listColors[list] = colorPalette[Math.abs(h) % colorPalette.length];
        }
        return listColors[list];
    }

    // Haversine
    function haversine(lat1,lng1,lat2,lng2) {
        const R=6371000,p1=lat1*Math.PI/180,p2=lat2*Math.PI/180,dp=(lat2-lat1)*Math.PI/180,dl=(lng2-lng1)*Math.PI/180;
        const a=Math.sin(dp/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
        return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    }

    // ═══════════════════════════════════════════
    // RENDER
    // ═══════════════════════════════════════════
    function getFiltered() {
        const q = document.getElementById('search').value.toLowerCase();
        return locations.filter(l => {
            const ml = !filterList || l.list === filterList;
            const mc = !filterCity || l.city === filterCity;
            const ms = !q || (l.name||'').toLowerCase().includes(q) || l.list.toLowerCase().includes(q) || (l.city||'').toLowerCase().includes(q);
            return ml && mc && ms;
        });
    }

    function renderMarkers(filtered) {
        map.removeLayer(markerCluster);
        markerCluster = L.markerClusterGroup({ maxClusterRadius: 50 });
        currentMarkers = [];

        filtered.forEach(loc => {
            const idx = locations.indexOf(loc);
            const color = getColor(loc.list);
            const marker = L.circleMarker([loc.lat, loc.lng], {
                radius: 9, fillColor: color, color: '#fff',
                weight: 2.5, opacity: 1, fillOpacity: 0.92
            });
            marker.bindTooltip(loc.name || loc.list, {
                permanent: map.getZoom() >= 15,
                direction: 'top', offset: [0, -8],
                className: 'bt-tooltip'
            });
            marker.on('click', () => showPlaceCard(loc, idx));
            markerCluster.addLayer(marker);
            currentMarkers.push({ loc, marker, idx });
        });

        if (!heatmapMode) map.addLayer(markerCluster);
        if (heatLayer) map.removeLayer(heatLayer);
        if (heatmapMode) {
            heatLayer = L.heatLayer(filtered.map(l => [l.lat, l.lng, 1]), { radius: 25, blur: 15 }).addTo(map);
        }

        document.getElementById('countPill').textContent = filtered.length + ' สถานที่';
        document.getElementById('countPill').classList.toggle('show', true);
    }

    map.on('zoomend', () => {
        const zoom = map.getZoom();
        currentMarkers.forEach(({ marker, loc }) => {
            const tt = marker.getTooltip();
            if (tt) zoom >= 15 ? marker.openTooltip() : marker.closeTooltip();
        });
    });

    function updateFilterSelects() {
        const lists = [...new Set(locations.map(l => l.list))].sort();
        const sel = document.getElementById('listFilter');
        const cv = sel.value;
        sel.innerHTML = '<option value="">ทุกรายการ</option>' + lists.map(l => `<option value="${l}">${l}</option>`).join('');
        sel.value = cv;

        const cities = [...new Set(locations.map(l => l.city).filter(Boolean))].sort();
        const cs = document.getElementById('cityFilter');
        const cv2 = cs.value;
        cs.innerHTML = '<option value="">ทุกเขต</option>' + cities.map(c => `<option value="${c}">${c}</option>`).join('');
        cs.value = cv2;
    }

    function update() {
        const filtered = getFiltered();
        renderMarkers(filtered);
        updateFilterSelects();
        renderListPanel(filtered);
    }

    // ═══════════════════════════════════════════
    // LIST PANEL
    // ═══════════════════════════════════════════
    function renderListPanel(filtered) {
        const body = document.getElementById('listBody');

        body.innerHTML = filtered.map((loc, i) => {
            const color = getColor(loc.list);
            return `<div class="list-item" onclick="showPlaceCard(locations[${locations.indexOf(loc)}], ${locations.indexOf(loc)}); closeListPanel();">
                <div class="list-item-icon" style="background:${color}20;">
                    <span style="font-size:16px;">📍</span>
                </div>
                <div class="list-item-text">
                    <div class="list-item-name">${loc.name || 'ไม่มีชื่อ'}</div>
                    <div class="list-item-sub">${loc.list}${loc.city ? ' · ' + loc.city : ''}</div>

                <span class="list-item-chevron">›</span>

    // ═══════════════════════════════════════════
    // SEARCH
    // ═══════════════════════════════════════════
    const searchInput = document.getElementById('search');
    const searchBox = document.getElementById('searchBox');
    const searchResults = document.getElementById('searchResults');
    const btnClearSearch = document.getElementById('btnClearSearch');

    searchInput.addEventListener('focus', () => { searchBox.classList.add('focused'); renderSearchResults(); });
    searchInput.addEventListener('blur', () => setTimeout(() => { searchBox.classList.remove('focused'); }, 200));
    searchInput.addEventListener('input', () => {
        btnClearSearch.classList.toggle('show', searchInput.value.length > 0);
        renderSearchResults(); update();
    });
    btnClearSearch.onclick = () => {
        searchInput.value = '';
        btnClearSearch.classList.remove('show');
        searchResults.innerHTML = '';
        update();
    };

    function renderSearchResults() {
        const q = searchInput.value.toLowerCase();
        if (!q) { searchResults.innerHTML = ''; return; }
        const matches = locations.filter(l =>
            (l.name||'').toLowerCase().includes(q) || l.list.toLowerCase().includes(q) || (l.city||'').toLowerCase().includes(q)
        ).slice(0, 8);
        searchResults.innerHTML = matches.map((loc, i) => {
            const color = getColor(loc.list);
            const idx = locations.indexOf(loc);
            return `<div class="search-result-item" onclick="showPlaceCard(locations[${idx}],${idx});document.getElementById('search').blur();">
                <div class="search-result-icon" style="background:${color}20;color:${color}">📍</div>
                <div class="search-result-text">
                    <div class="search-result-name">${loc.name || 'ไม่มีชื่อ'}</div>
                    <div class="search-result-sub">${loc.list}${loc.city ? ' · ' + loc.city : ''}</div>
                </div>
            </div>`;
        }).join('');

    // ═══════════════════════════════════════════
    // GPS
    // ═══════════════════════════════════════════
    document.getElementById('btnGps').onclick = () => {
        if (!navigator.geolocation) { showToast('Browser ไม่รองรับ GPS'); return; }
        const btn = document.getElementById('btnGps');
        btn.classList.add('locating');
        navigator.geolocation.getCurrentPosition(pos => {
            btn.classList.remove('locating');
            const { latitude: lat, longitude: lng, accuracy } = pos.coords;
            if (myLocationMarker) map.removeLayer(myLocationMarker);
            if (myLocationCircle) map.removeLayer(myLocationCircle);
            myLocationCircle = L.circle([lat, lng], { radius: accuracy, color: '#1a73e8', fillColor: '#1a73e8', fillOpacity: 0.08, weight: 1.5 }).addTo(map);
            myLocationMarker = L.marker([lat, lng], {
                icon: L.divIcon({ className: '', html: '<div class="you-are-here"></div>', iconSize: [18,18], iconAnchor: [9,9] }),
                zIndexOffset: 1000
            }).addTo(map)
              .bindPopup(`<div style="padding:12px;font-size:13px;"><b>📍 ตำแหน่งของฉัน</b><br><small style="color:#5f6368;">${lat.toFixed(6)}, ${lng.toFixed(6)}</small><br><br><button onclick="openAddAt(${lat},${lng})" style="background:#1a73e8;color:white;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:12px;font-family:inherit;">+ ปักหมุดที่นี่</button></div>`)
              .openPopup();
            map.setView([lat, lng], 17);
        }, () => {
            btn.classList.remove('locating');
            showToast('ไม่สามารถหาตำแหน่งได้');
        }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
    };

    document.getElementById('btnUseGpsModal').onclick = () => {
        if (!navigator.geolocation) { showToast('Browser ไม่รองรับ GPS'); return; }
        const btn = document.getElementById('btnUseGpsModal');
        btn.textContent = '⏳ กำลังหาตำแหน่ง...';
        navigator.geolocation.getCurrentPosition(pos => {
            document.getElementById('modalLat').value = pos.coords.latitude.toFixed(6);
            document.getElementById('modalLng').value = pos.coords.longitude.toFixed(6);
            btn.textContent = '✅ ได้ตำแหน่งแล้ว';
            setTimeout(() => btn.textContent = '📍 ใช้ตำแหน่งของฉัน', 2000);
        }, () => {
            btn.textContent = '📍 ใช้ตำแหน่งของฉัน';
            showToast('ไม่สามารถหาตำแหน่งได้');
        }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
    };

    // ═══════════════════════════════════════════

    const crosshair = document.getElementById('crosshair');
    const addBanner = document.getElementById('addBanner');
    const fab = document.getElementById('btnFab');

    fab.onclick = () => {
        if (addMode) { cancelAddMode(); return; }
        addMode = true;
        fab.classList.add('add-mode');
        fab.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>ยกเลิก`;

        crosshair.classList.add('show');
        document.getElementById('map').classList.add('add-cursor');
        closePlaceCard();

    document.getElementById('btnCancelAdd').onclick = cancelAddMode;

        addMode = false;
        fab.classList.remove('add-mode');
        fab.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>เพิ่มจุด`;
        addBanner.classList.remove('show');
        crosshair.classList.remove('show');
        document.getElementById('map').classList.remove('add-cursor');
    }

    document.getElementById('map').addEventListener('mousemove', e => {
        if (!addMode) return;
        crosshair.style.left = e.clientX + 'px';
        crosshair.style.top = e.clientY + 'px';

    // ═══════════════════════════════════════════
    // MAP CLICK
    // ═══════════════════════════════════════════
    map.on('click', e => {
        const { lat, lng } = e.latlng;
        if (document.getElementById('editModalOverlay').classList.contains('open')) {
            document.getElementById('modalLat').value = lat.toFixed(6);
            document.getElementById('modalLng').value = lng.toFixed(6);
            ['modalLat','modalLng'].forEach(id => {

        document.getElementById('editModalTitle').textContent = 'เพิ่มสถานที่';
        document.getElementById('modalName').value = '';
        document.getElementById('modalList').value = filterList || '';
        document.getElementById('modalCity').value = filterCity || '';
        document.getElementById('modalLat').value = parseFloat(lat).toFixed(6);
        document.getElementById('modalLng').value = parseFloat(lng).toFixed(6);
        document.getElementById('editModalOverlay').classList.add('open');

    // ═══════════════════════════════════════════
    window.openEdit = function(idx) {
        const loc = locations[idx];
        if (!loc) return;
        editingIndex = idx;
        document.getElementById('editModalTitle').textContent = 'แก้ไขสถานที่';
        document.getElementById('modalName').value = loc.name || '';
        document.getElementById('modalList').value = loc.list || '';

    document.getElementById('editModalCancel').onclick = () => document.getElementById('editModalOverlay').classList.remove('open');
    document.getElementById('editModalOverlay').onclick = e => { if (e.target === document.getElementById('editModalOverlay')) document.getElementById('editModalOverlay').classList.remove('open'); };

    document.getElementById('editModalSave').onclick = () => {
        const name = document.getElementById('modalName').value.trim();
        const list = document.getElementById('modalList').value.trim() || 'ไม่มีรายการ';
        const city = document.getElementById('modalCity').value.trim();
        const lat = parseFloat(document.getElementById('modalLat').value);
        const lng = parseFloat(document.getElementById('modalLng').value);
        if (isNaN(lat) || isNaN(lng)) { showToast('กรุณากรอก Lat/Lng', true); return; }
        pushUndo();
        if (editingIndex >= 0) locations[editingIndex] = { name, lat, lng, list, city };
        else locations.push({ name, lat, lng, list, city });
        saveLocations();
        document.getElementById('editModalOverlay').classList.remove('open');
        update();
        showToast(editingIndex >= 0 ? 'บันทึกสำเร็จ' : 'เพิ่มสถานที่แล้ว');
        if (editingIndex < 0) map.setView([lat, lng], 15);
    };

    // DELETE
    // ═══════════════════════════════════════════
    window.doConfirmDelete = function(idx) {
        const loc = locations[idx];
        if (!loc) return;
        showConfirm('🗑️', 'ลบสถานที่?', `"${loc.name || loc.list}" จะถูกลบ (Undo ได้)`, () => {
            pushUndo();
            locations.splice(idx, 1);
            saveLocations();
            closePlaceCard();
            update();
            showToast('ลบแล้ว');
        });
    };

    // ═══════════════════════════════════════════
    // MEASURE
    // ═══════════════════════════════════════════
    window.startMeasure = function(idx) {
        const loc = locations[idx];
        if (!measureStart) {
            measureStart = loc;
            closePlaceCard();
            showToast('เลือกจุดที่ 2 เพื่อวัดระยะ');
        } else {
            const d = haversine(measureStart.lat, measureStart.lng, loc.lat, loc.lng);
            if (measureLine) map.removeLayer(measureLine);
            measureLine = L.polyline([[measureStart.lat,measureStart.lng],[loc.lat,loc.lng]],{color:'#ea4335',weight:3,dashArray:'8,6'}).addTo(map);
            showToast(`📏 ${(d/1000).toFixed(2)} km (${Math.round(d)} ม.)`);
            measureStart = null;
        }
    };

    function openInfoPanel(mode) {
        const panel = document.getElementById('infoPanel');
        const body = document.getElementById('infoPanelBody');
        if (mode === 'stats') {
            document.getElementById('infoPanelTitle').textContent = 'สถิติ';
            const listCount = {}, cityCount = {};
            locations.forEach(l => { listCount[l.list]=(listCount[l.list]||0)+1; if(l.city) cityCount[l.city]=(cityCount[l.city]||0)+1; });
            const maxL = Math.max(...Object.values(listCount));
            const sortedL = Object.entries(listCount).sort((a,b)=>b[1]-a[1]);
            const sortedC = Object.entries(cityCount).sort((a,b)=>b[1]-a[1]);
            body.innerHTML = `
                <div class="stats-section">
                    <div style="font-size:28px;font-weight:700;color:var(--blue);margin-bottom:4px;">${locations.length}</div>
                    <div style="font-size:13px;color:var(--text3);margin-bottom:20px;">สถานที่ทั้งหมด</div>
                    <div class="stats-header">ตามรายการ</div>
                    ${sortedL.map(([n,c])=>`<div class="stats-row"><span class="stats-dot" style="background:${getColor(n)}"></span><span class="stats-name">${n}</span><div class="stats-bar-wrap"><div class="stats-bar" style="width:${c/maxL*100}%;background:${getColor(n)}"></div></div><span class="stats-count">${c}</span></div>`).join('')}
                    <div class="stats-header" style="margin-top:20px;">ตามเขต</div>
                    ${sortedC.map(([n,c])=>`<div class="stats-row"><span class="stats-name">${n}</span><span class="stats-count">${c}</span></div>`).join('')}
                </div>`;
        } else {
            document.getElementById('infoPanelTitle').textContent = 'BT Locations';
            body.innerHTML = `
                <div style="padding:16px;">
                    <div style="font-size:14px;color:var(--text2);margin-bottom:20px;">แผนที่จุด BT Locations</div>
                    ${[
                        ['📤','Export JSON','omExport'],
                        ['📥','Import JSON','omImport'],
                        ['📊','สถิติ','omStats'],
                        ['🔥',heatmapMode?'ปิด Heatmap':'เปิด Heatmap','omHeatmap'],
                        ['🌙','Dark mode','omDark'],
                        ['↩','Undo','omUndoM'],
                        ['🗑️','ลบที่กรอง (Bulk)','omBulkDelM'],
                        ['🔄','รีเซ็ตข้อมูล','omResetM'],
                    ].map(([icon,label,id])=>`<button class="om-item" id="${id}" style="border-radius:12px;"><span style="font-size:18px;width:20px;">${icon}</span>${label}</button>`).join('')}
                </div>`;
            bindMenuItems();
        }
        panel.classList.add('open');
        document.getElementById('infoPanelBackdrop').classList.add('show');
    }

        bind('omUndoM', doUndo);
        bind('omBulkDelM', doBulkDel);

    // ═══════════════════════════════════════════
    // ACTIONS
    // ═══════════════════════════════════════════
    function doExport() {
        const blob = new Blob([JSON.stringify(locations,null,2)],{type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'bt_locations.json'; a.click();
        closeInfo();
    }

    document.getElementById('fileImport').onchange = e => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                const imp = JSON.parse(ev.target.result);
                if (!Array.isArray(imp)) { showToast('ไฟล์ไม่ถูกต้อง', true); return; }
                showConfirm('📥','Import ข้อมูล?',`จะแทนที่ด้วย ${imp.length} จุด`,() => {
                    pushUndo(); locations = imp; saveLocations(); update(); showToast(`Import ${imp.length} จุดสำเร็จ`);
                });
            } catch { showToast('JSON ไม่ถูกต้อง', true); }
        };
        reader.readAsText(file);
        e.target.value = '';
    };

    function doUndo() {
        if (!undoStack.length) { showToast('ไม่มี Undo'); return; }
        locations = JSON.parse(undoStack.pop()); saveLocations(); update(); showToast('Undo แล้ว'); closeInfo();
    }

    function doBulkDel() {
        const filtered = getFiltered();
        if (!filterList && !filterCity && !document.getElementById('search').value) { showToast('กรุณา filter ก่อน',true); return; }
        if (!filtered.length) { showToast('ไม่มีจุดในตัวกรอง',true); return; }
        showConfirm('🗑️',`ลบ ${filtered.length} จุด?`, 'จุดที่อยู่ในตัวกรองปัจจุบันจะถูกลบทั้งหมด', () => {
            pushUndo(); const rm = new Set(filtered); locations = locations.filter(l=>!rm.has(l));
            saveLocations(); update(); showToast(`ลบ ${filtered.length} จุดแล้ว`);
        }); closeInfo();
    }

    async function doReset() {
        showConfirm('🔄','รีเซ็ตข้อมูล?','ข้อมูลที่แก้ไขจะหาย ระบบจะดึงข้อมูลใหม่จาก GitHub', async () => {
            pushUndo(); localStorage.removeItem(STORAGE_KEY);
            try {
                const res = await fetch(`https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/all_locations.json?t=${Date.now()}`);
                if (res.ok) { locations = await res.json(); saveLocations(); update(); showToast(`โหลด ${locations.length} จุดจาก GitHub`); return; }
            } catch {}
            locations = JSON.parse(JSON.stringify(DEFAULT_LOCATIONS)); saveLocations(); update(); showToast('รีเซ็ตสำเร็จ');
        }); closeInfo();
    }

    function toggleDark() {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        showToast(isDark ? 'Dark mode เปิดแล้ว' : 'Light mode');
        closeInfo();
    }

    // ═══════════════════════════════════════════
    // GITHUB SAVE
    // ═══════════════════════════════════════════
    function getToken() { return localStorage.getItem(GITHUB_TOKEN_KEY)||''; }
    function setToken(t) { localStorage.setItem(GITHUB_TOKEN_KEY,t); }

    async function doGithubSaveFlow() {
        if (!getToken()) { document.getElementById('tokenInput').value=''; document.getElementById('tokenModalOverlay').classList.add('open'); return; }
        await doGithubSave(getToken());
    }

    document.getElementById('tokenCancel').onclick = () => document.getElementById('tokenModalOverlay').classList.remove('open');
    document.getElementById('tokenSave').onclick = async () => {
        const t = document.getElementById('tokenInput').value.trim();
        if (!t) { showToast('กรุณากรอก Token',true); return; }
        setToken(t); document.getElementById('tokenModalOverlay').classList.remove('open');
        await doGithubSave(t);
    };
    document.getElementById('tokenModalOverlay').onclick = e => { if(e.target===document.getElementById('tokenModalOverlay')) document.getElementById('tokenModalOverlay').classList.remove('open'); };

    async function githubFile(path, token) {
        const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`,{headers:{'Authorization':`token ${token}`,'Accept':'application/vnd.github.v3+json'}});
        if (res.status===404) return {sha:null};
        if (!res.ok) throw new Error(`GitHub ${res.status}`);
        const d = await res.json(); return {sha:d.sha};
    }
    async function githubPut(path, content, sha, token, msg) {
        const body = {message:msg,content:btoa(unescape(encodeURIComponent(content)))};
        if (sha) body.sha = sha;
        const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`,{method:'PUT',headers:{'Authorization':`token ${token}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
        if (!res.ok) { const e=await res.json(); throw new Error(e.message||`GitHub ${res.status}`); }
    }

    async function doGithubSave(token) {
        const saveBtn = document.getElementById('btnGithubSave');
        saveBtn.style.color='#fbbc04';
        showToast('⏳ กำลังบันทึก...');
        try {
            const json = JSON.stringify(locations,null,2);
            const [f1,f2,f3] = await Promise.all([githubFile('all_locations.json',token),githubFile('docs/all_locations.json',token),githubFile('docs/locations.js',token)]);
            await Promise.all([
                githubPut('all_locations.json',json,f1.sha,token,'Update from web'),
                githubPut('docs/all_locations.json',json,f2.sha,token,'Sync docs'),
                githubPut('docs/locations.js','const DEFAULT_LOCATIONS='+JSON.stringify(locations)+';\n',f3.sha,token,'Sync locations.js'),
            ]);
            showToast('✅ บันทึก GitHub สำเร็จ');
        } catch(err) {
            if (err.message.includes('401')||err.message.includes('credentials')) {
                localStorage.removeItem(GITHUB_TOKEN_KEY);
                showToast('Token ไม่ถูกต้อง',true);
            } else showToast('ผิดพลาด: '+err.message,true);
        } finally {
            saveBtn.style.color='';
        }
    }

    // ═══════════════════════════════════════════
    // CONFIRM DIALOG
    // ═══════════════════════════════════════════
    let confirmCallback = null;
    function showConfirm(icon, title, text, cb) {
        document.getElementById('confirmIcon').textContent = icon;
        document.getElementById('confirmTitle').textContent = title;
        document.getElementById('confirmText').textContent = text;
        confirmCallback = cb;
        document.getElementById('confirmModalOverlay').classList.add('open');
    }
    document.getElementById('confirmCancel').onclick = () => document.getElementById('confirmModalOverlay').classList.remove('open');
    document.getElementById('confirmOk').onclick = () => {
        document.getElementById('confirmModalOverlay').classList.remove('open');
        if (confirmCallback) { confirmCallback(); confirmCallback = null; }
    };
    document.getElementById('confirmModalOverlay').onclick = e => { if(e.target===document.getElementById('confirmModalOverlay')) document.getElementById('confirmModalOverlay').classList.remove('open'); };

    // ═══════════════════════════════════════════
    // TOAST
    // ═══════════════════════════════════════════
    let toastTimer;
    function showToast(msg, isError=false) {
        const t = document.getElementById('saveToast');
        t.textContent = msg;
        t.className = 'save-toast show' + (isError?' error':'');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ═══════════════════════════════════════════
    // CLOSE on backdrop click
    // ═══════════════════════════════════════════
    map.on('click', () => {
        if (!addMode) closePlaceCard();
        closeListPanel();
    });

    // Expose for inline onclick
    window.showPlaceCard = showPlaceCard;
    window.closeListPanel = closeListPanel;

    // ═══════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════
    update();

    // Tooltip style
    const style = document.createElement('style');
    style.textContent = `.bt-tooltip{background:rgba(32,33,36,0.82)!important;color:#fff!important;border:none!important;border-radius:6px!important;padding:3px 8px!important;font-size:11px!important;font-weight:600!important;box-shadow:0 1px 4px rgba(0,0,0,.3)!important;white-space:nowrap!important;font-family:inherit!important;}`;
    document.head.appendChild(style);

    // Background sync
    (async()=>{
        try {
            const res=await fetch(`https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/all_locations.json?t=${Date.now()}`);
            if(!res.ok)return;
            const fresh=await res.json();
            if(fresh.length>0&&fresh.length>=locations.length&&JSON.stringify(fresh)!==JSON.stringify(locations)){
                locations=fresh; saveLocations(); update();
                console.log('Synced',fresh.length,'from GitHub');
            }
        }catch(e){}
    })();
    </script>
</body>
</html>
